spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3308/charging?characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:fproject}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.tomcat.max-active=30
spring.datasource.tomcat.max-idle=20
spring.datasource.tomcat.min-idle=10

# Kakao OAuth
kakao.client-id=${KAKAO_CLIENT_ID:}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:}

# Naver OAuth
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
naver.redirect-uri=${NAVER_REDIRECT_URI:}

# Public Charging Station API
charging.api.key=${CHARGING_API_KEY:}
